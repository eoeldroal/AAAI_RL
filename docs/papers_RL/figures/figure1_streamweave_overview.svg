<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="600" viewBox="0 0 1600 600" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc" focusable="false" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="title">StreamWeave overview</title>
  <desc id="desc">Panel a shows the naive trade-off: waiting for an incomplete prompt group idles the learner, while deciding early can select the wrong training source. Panel b shows StreamWeave advancing rollout attempts independently, making source decisions only for complete groups, and updating the model while another group remains in progress.</desc>

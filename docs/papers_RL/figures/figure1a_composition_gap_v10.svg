<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="772" viewBox="0 0 1600 772" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc" focusable="false" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="title">The composition gap (panel a draft v8)</title>
  <desc id="desc">Three executions of the same workload as aligned timeline lanes. Lane 1, fully-asynchronous RL: fast, but an all-fail group yields no learning signal. Lane 2, synchronous hybrid: a barrier waits for the slowest attempt so every group gets a source-correct decision, but that waiting dominates the lane. Lane 3, combining the two directly: no barrier, so the source decision fires as soon as the visible attempts look all-fail and routes to expert — but a later attempt finishes successfully, past the decision point, proving the group was mixed and should have trained on policy rollouts. The runtime's arrival order rewrote the routing.</desc>

  <!-- ================= lane 3: the composition gap (hinge + two horns) ================= -->
  <g id="lane-gap">
    <text x="40" y="500" class="t label">&#9314; Combining &#9312; + &#9313;</text>
    <text x="228" y="500" class="t small muted">&#8212; the group the decision needs has no place in a trajectory stream</text>

    <!-- the hinge: the completed group is the unit the decision needs -->
    <rect x="70" y="596" width="150" height="64" rx="12" fill="#E8F5F2" stroke="#138276" stroke-width="2.5"/>
    <rect x="86" y="617" width="20" height="20" rx="4" fill="#2F63D8"/>
    <rect x="112" y="617" width="20" height="20" rx="4" fill="#2F63D8"/>
    <rect x="138" y="617" width="20" height="20" rx="4" fill="#2F63D8"/>
    <rect x="164" y="617" width="20" height="20" rx="4" fill="#2F63D8"/>
    <text x="145" y="684" text-anchor="middle" class="t small teal-text">group</text>
    <text x="145" y="704" text-anchor="middle" class="t micro muted">decision unit</text>

    <!-- fork: two bad choices -->
    <path d="M224 612 C280 596 300 560 336 552" class="line" stroke="#1C2738" stroke-width="2.6" marker-end="url(#arrow-ink)"/>
    <path d="M224 644 C280 660 300 698 336 706" class="line" stroke="#1C2738" stroke-width="2.6" marker-end="url(#arrow-ink)"/>

    <!-- UP horn: hold the group whole -> barrier returns -> efficiency lost (execution layer) -->
    <text x="342" y="540" class="t small dark-text">hold the group whole</text>
    <rect x="346" y="552" width="602" height="58" fill="#8B98A8" opacity="0.10"/>
    <path d="M360 570 H548 M360 586 H548 M360 602 H548" class="line" stroke="#2F63D8" stroke-width="4"/>
    <circle cx="548" cy="570" r="5" fill="#2F63D8"/><circle cx="548" cy="586" r="5" fill="#2F63D8"/><circle cx="548" cy="602" r="5" fill="#2F63D8"/>
    <rect x="556" y="556" width="15" height="50" fill="#8B98A8" opacity="0.55"/>
    <path d="M582 570 H930 M582 586 H930 M582 602 H930" class="line" stroke="#8B98A8" stroke-width="2.4" stroke-dasharray="6 7" opacity="0.6"/>
    <circle cx="924" cy="586" r="16" fill="#FFFFFF" stroke="#637185" stroke-width="2.4"/>
    <path d="M924 586 V575 M924 586 H932" class="line" stroke="#637185" stroke-width="2.4"/>
    <text x="982" y="580" class="t small coral-text">&#10007; efficiency lost</text>
    <text x="982" y="604" class="t micro muted">execution layer &#183; the barrier returns</text>

    <!-- DOWN horn: let the stream flow -> expert has no version -> semantics rewritten (theory layer) -->
    <text x="342" y="678" class="t small dark-text">let the stream flow</text>
    <text x="392" y="700" text-anchor="middle" class="t micro blue-text">rollout &#183; v = k</text>
    <path d="M470 704 H556" class="line" stroke="#2F63D8" stroke-width="4"/>
    <text x="392" y="742" text-anchor="middle" class="t micro orange-text">expert &#183; v = &#8869;</text>
    <path d="M470 736 H556" class="line" stroke="#D8891C" stroke-width="4"/>
    <rect x="560" y="694" width="150" height="52" rx="11" fill="#EAF0FC" stroke="#2F63D8" stroke-width="2.2"/>
    <text x="635" y="716" text-anchor="middle" class="t micro blue-text">policy-lag correction</text>
    <text x="635" y="734" text-anchor="middle" class="t micro muted">reads a version</text>
    <path d="M714 704 H812" class="line" stroke="#2F63D8" stroke-width="4"/>
    <path d="M792 698 L800 706 L814 692" class="line" stroke="#2F63D8" stroke-width="3.2"/>
    <path d="M714 736 H792" class="line" stroke="#D8891C" stroke-width="4"/>
    <path d="M804 728 L820 744 M820 728 L804 744" class="line" stroke="#B8433D" stroke-width="3.4"/>
    <text x="852" y="712" class="t small coral-text">&#10007; semantics rewritten</text>
    <text x="852" y="736" class="t micro muted">theory layer &#183; expert has no version to correct</text>
  </g>

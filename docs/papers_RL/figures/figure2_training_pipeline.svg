<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="610" viewBox="0 0 1600 610" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc" focusable="false" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <title id="title">StreamWeave end-to-end training pipeline</title>
  <desc id="desc">Prompt groups are dispatched into independent rollout workers and reconstructed at complete-group context. A source selector emits either policy rollouts or an expert trajectory, preserves provenance through a mixed stream, and applies source-specific operators before updating the model. A separate control path refreshes rollout workers.</desc>
  <metadata>{"figure_id":"figure2_training_pipeline","status":"ready","visible_text_policy":"component identity and short state labels only"}</metadata>

hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_megatron_trainer
  - _self_

async_training:

  # Maximum samples staleness threshold
  staleness_threshold: 0.1

  # Optional split between execution in-flight budget and completed queue budget.
  # When unset, the existing fully-async max_required_samples behavior is used.
  max_inflight_prompt_groups: null
  max_completed_prompt_groups: null

  # Frequency of parameter synchronization between rollouter and trainer, 
  # One step means trainer obtains a batch of required samples
  trigger_parameter_sync_step: 4
  
  # The number of ppo_mini_batches that the FullyAsyncTrainer obtains once
  require_batches: 1

  # When synchronizing parameters, Whether to resume generation when rollout is interrupted.
  # If True, LLMServerClient auto resume generation, making rollout interruption invisible to the AgentLoop.
  partial_rollout: True

  # whether to use trainer do_validate
  use_trainer_do_validate: False

async_hpt:

  # Hybrid Prompt Trajectory routing is opt-in and disabled by default.
  enabled: False

  # Route to tau SFT when prompt-group success probability is <= gamma.
  gamma: 0.0
  beta: 1.0
  alpha: 1.0

  # Phase-1 HPT keeps prompt-equal aggregation and rollout old-logprob anchors.
  loss_aggregation: prompt_equal
  rl_old_logprob_source: rollout

  # Tau supervision source. Required only when async_hpt.enabled=true.
  tau_dataset_path: null
  tau_messages_key: tau_messages
  fail_on_missing_tau: False

  # Prompt-group success score used by the rollout gate.
  success_score_key: reward_score
  success_threshold: 0.0

  # Optional RL-only staleness extension. Null disables this policy.
  k_max: null

  trajectory_scheduler:
    enabled: False

# Rollout config
rollout:

  # Number of nodes used in the rollout
  nnodes: 1

  # Number of GPUs per node                     
  n_gpus_per_node: 8

  # number of responses (i.e. num sample times). > 1 for grpo
  n: 4

  # total rollout samples # TODO rename to total_rollout_samples
  total_rollout_steps: 100

data:
  # Number of samples generated, currently only support 1
  gen_batch_size: 1

actor_rollout_ref:

  rollout:
    # Must be enabled! Otherwise, log_probs cannot be calculated.
    calculate_log_probs: True

    checkpoint_engine:
      backend: "nccl"

  actor:
    # Must use rollout log probs for training
    use_rollout_log_probs: True

  model:
    # To use remove padding (thd)
    use_remove_padding: True

# Only then will the use of log probs be correct.
# And it can be used in conjunction with other rollout_correction algorithms.
algorithm:
  rollout_correction:
    bypass_mode: True
